version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: sth-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smart_thesis_hub
    volumes:
      - mongodb_data:/data/db
    networks:
      - sth-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sth-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/smart_thesis_hub
      JWT_SECRET: ${JWT_SECRET:-sth_diu_secret_key_2024}
      JWT_EXPIRES_IN: 24h
      SUPERVISOR_ACCESS_CODE: ${SUPERVISOR_ACCESS_CODE:-DIU@2024}
      ADMIN_ACCESS_CODE: ${ADMIN_ACCESS_CODE:-ADMIN#DIU}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - sth-network

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sth-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - sth-network

volumes:
  mongodb_data:

networks:
  sth-network:
    driver: bridge
